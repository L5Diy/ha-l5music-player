<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="L5Music" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#070707" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" href="/favicon.png?v=b371" />
  <title>Music</title>
  <link rel="stylesheet" href="styles.css?v=b371" />
  <link rel="stylesheet" href="pwa.css?v=b371" />
  <style>
    /* Mode switching — applied before first paint by inline script */
    .mode-desktop #mobile-app  { display: none !important; }
    .mode-mobile  #desktop-app { display: none !important; }
    #mini-player #mini-progress-row { display:flex !important; flex-direction:row !important; align-items:center; gap:6px; padding-top:4px; font-size:10px; }
    @media (orientation: portrait) { .np-controls-side { display: none !important; } }
    #mini-player #mini-progress-row #mini-progress-slider { flex:1; min-width:0; }
    #mini-player #mini-progress-row #mini-current-time,
    #mini-player #mini-progress-row #mini-duration { flex-shrink:0; white-space:nowrap; }
  </style>
  <!-- Runs synchronously before paint — no flash of wrong layout -->
  <script>
    (function () {
      var mobile = window.innerWidth <= 768 || (window.innerHeight <= 500 && window.innerWidth < 1024);
      document.documentElement.classList.add(mobile ? 'mode-mobile' : 'mode-desktop');
      window.IS_MOBILE = mobile;
    })();
    // Theme presets — applied before render to prevent flash
    window.L5_ACCENTS = {
      orange: { accent:'#FF7A18', accent2:'#ff9a3c', weak:'rgba(255,122,24,.18)', glow:'rgba(255,122,24,.12)', focus:'rgba(255,122,24,.55)' },
      blue:   { accent:'#3B82F6', accent2:'#60a5fa', weak:'rgba(59,130,246,.18)', glow:'rgba(59,130,246,.12)', focus:'rgba(59,130,246,.55)' },
      purple: { accent:'#A855F7', accent2:'#c084fc', weak:'rgba(168,85,247,.18)', glow:'rgba(168,85,247,.12)', focus:'rgba(168,85,247,.55)' },
      green:  { accent:'#22C55E', accent2:'#4ade80', weak:'rgba(34,197,94,.18)', glow:'rgba(34,197,94,.12)', focus:'rgba(34,197,94,.55)' },
      red:    { accent:'#EF4444', accent2:'#f87171', weak:'rgba(239,68,68,.18)', glow:'rgba(239,68,68,.12)', focus:'rgba(239,68,68,.55)' },
      pink:   { accent:'#EC4899', accent2:'#f472b6', weak:'rgba(236,72,153,.18)', glow:'rgba(236,72,153,.12)', focus:'rgba(236,72,153,.55)' }
    };
    window.L5_BGS = {
      black:  { bg0:'#070707', bg1:'#0f0f10', bg2:'#151516', text0:'#f3f3f3', text1:'rgba(255,255,255,.72)', muted:'rgba(255,255,255,.45)', stroke:'rgba(255,255,255,.08)', overlay:'rgba(255,255,255,.06)', hoverBg:'rgba(255,255,255,.06)', hoverBorder:'rgba(255,255,255,.12)', hoverColor:'#ffffff', isDark:'1' },
      gray:   { bg0:'#262626', bg1:'#2e2e2e', bg2:'#383838', text0:'#f3f3f3', text1:'rgba(255,255,255,.72)', muted:'rgba(255,255,255,.50)', stroke:'rgba(255,255,255,.10)', overlay:'rgba(255,255,255,.06)', hoverBg:'rgba(255,255,255,.08)', hoverBorder:'rgba(255,255,255,.14)', hoverColor:'#ffffff', isDark:'1' },
      warm:   { bg0:'#f5f0e8', bg1:'#ece5d8', bg2:'#e0d6c4', text0:'#1a1a1a', text1:'rgba(0,0,0,.72)', muted:'rgba(0,0,0,.45)', stroke:'rgba(0,0,0,.10)', overlay:'rgba(0,0,0,.04)', hoverBg:'rgba(0,0,0,.06)', hoverBorder:'rgba(0,0,0,.12)', hoverColor:'#000000', isDark:'0' },
      white:  { bg0:'#f8f8f8', bg1:'#f0f0f0', bg2:'#e8e8e8', text0:'#1a1a1a', text1:'rgba(0,0,0,.72)', muted:'rgba(0,0,0,.45)', stroke:'rgba(0,0,0,.10)', overlay:'rgba(0,0,0,.04)', hoverBg:'rgba(0,0,0,.06)', hoverBorder:'rgba(0,0,0,.12)', hoverColor:'#000000', isDark:'0' }
    };
    window.applyL5Theme = function() {
      var r = document.documentElement.style;
      var a = window.L5_ACCENTS[localStorage.getItem('l5_accent')] || window.L5_ACCENTS.orange;
      var b = window.L5_BGS[localStorage.getItem('l5_bg')] || window.L5_BGS.black;
      r.setProperty('--accent', a.accent); r.setProperty('--accent-2', a.accent2); r.setProperty('--accent-weak', a.weak);
      r.setProperty('--accent-glow', a.glow); r.setProperty('--accent-focus', a.focus);
      r.setProperty('--bg-0', b.bg0); r.setProperty('--bg-1', b.bg1); r.setProperty('--bg-2', b.bg2);
      r.setProperty('--text-0', b.text0); r.setProperty('--text-1', b.text1); r.setProperty('--muted', b.muted); r.setProperty('--stroke', b.stroke);
      r.setProperty('--overlay', b.overlay); r.setProperty('--hover-bg', b.hoverBg); r.setProperty('--hover-border', b.hoverBorder); r.setProperty('--hover-color', b.hoverColor);
      document.documentElement.setAttribute('data-theme', b.isDark === '1' ? 'dark' : 'light');
    };
    applyL5Theme();
  </script>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     DESKTOP APP  (hidden on mobile via .mode-mobile #desktop-app)
     ═══════════════════════════════════════════════════════════ -->
<div id="desktop-app" class="music-app app-shell">
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-header">
      <div style="display:flex;align-items:center;gap:10px">
        <img src="assets/music_logo.png" alt="" style="width:32px;height:32px;border-radius:8px;object-fit:cover" />
        <span class="sidebar-logo"><span style="font-weight:900;font-family:sans-serif;color:var(--text-0)">L5</span><span style="font-family:Didot,'Bodoni MT','Didot LT STD',serif;font-style:normal;font-weight:400;color:var(--accent)">Music</span></span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <ul id="nav-items">
        <li data-view="now-playing" class="nav-item active"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15 9a3 3 0 0 1 0 6"/></svg></span><span class="label">Now Playing</span></li>
        <li data-view="playlists" class="nav-item"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg></span><span class="label">Playlists</span></li>
        <li data-view="folders" class="nav-item has-children">
          <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7h5l2 2h11v10a2 2 0 0 1-2 2H3z"/><path d="M3 7V5a2 2 0 0 1 2-2h3l2 2h9a2 2 0 0 1 2 2v2"/></svg></span><span class="label">Folders</span>
          <ul class="sub-nav">
            <li data-view="folder-songs" class="sub-item"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="7" cy="18" r="2"/><circle cx="19" cy="16" r="2"/></svg></span>Songs</li>
            <li data-view="folder-artists" class="sub-item"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span>Artists</li>
            <li data-view="folder-albums" class="sub-item"><span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="2"/></svg></span>Albums</li>
            <li data-view="folder-blocked" class="sub-item"><span class="icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5.65 3.35L5.35 17.65C4.49 16.24 4 14.68 4 12c0-4.42 3.58-8 8-8 2.68 0 4.24.49 5.65 1.35zm1.3 1.3C19.51 7.76 20 9.32 20 12c0 4.42-3.58 8-8 8-2.68 0-4.24-.49-5.65-1.35L18.95 5.65z"/></svg></span>Blocked</li>
          </ul>
        </li>
      </ul>
    </nav>
    <div class="sidebar-footer">
      <button type="button" id="nav-ytmp3" class="nav-item" data-view="ytmp3" aria-label="YTMP3" style="display:none">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M9 18V5l12-2v13" />
            <circle cx="6" cy="18" r="2" />
            <circle cx="18" cy="16" r="2" />
          </svg>
        </span>
        <span class="label">YTMP3</span>
      </button>
      <button type="button" id="nav-admin" class="nav-item" data-view="admin" aria-label="Admin" style="display:none">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </span>
        <span class="label">Admin</span>
      </button>
      <button type="button" id="nav-settings" class="nav-item" data-view="settings" aria-label="Settings">
        <span class="icon"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96a7.02 7.02 0 0 0-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.47.47 0 0 0-.59.22L2.74 8.87a.47.47 0 0 0 .12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.37 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.57 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.47.47 0 0 0-.12-.61l-2.01-1.58zM12 15.6a3.6 3.6 0 1 1 0-7.2 3.6 3.6 0 0 1 0 7.2z"/></svg></span>
        <span class="label">Settings</span>
      </button>
    </div>
  </aside>
  <div id="sidebar-backdrop" class="sidebar-backdrop" aria-hidden="true"></div>
  <main id="main" class="content main">
    <header class="top-bar topbar">
      <div class="top-left">
        <button type="button" id="sidebar-toggle" class="sidebar-toggle" aria-label="Open menu" aria-expanded="false">☰</button>
        <div class="brand top-logo-link">
          <img src="assets/music_logo.png" alt="L5Music" class="top-avatar" />
        </div>
        <div class="search-wrap">
          <svg class="search-icon-inside" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input type="search" id="search-input" class="search-input" placeholder="Search songs, artists..." aria-label="Search" />
        </div>
      </div>
      <div class="top-center topbar-center">
      </div>
      <div class="top-right" id="settings-container">
        <div class="menu-dots-wrap" style="position:relative">
          <button id="menu-dots-btn" class="icon-btn" aria-label="Menu" style="font-size:20px;letter-spacing:2px;cursor:pointer;background:none;border:none;color:var(--text-1);padding:6px 8px">⋮</button>
          <div id="menu-dots-dropdown" class="dots-dropdown" style="display:none;position:absolute;right:0;top:100%;min-width:200px;background:var(--bg-1);border:1px solid var(--stroke);border-radius:10px;padding:8px 0;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.3)">
            <div style="padding:8px 14px;font-size:12px;color:var(--muted);text-transform:uppercase">Playback Output</div>
            <label class="dots-menu-item" style="display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;font-size:14px;color:var(--text-0)"><input type="radio" name="d-playback-output" value="browser" checked style="accent-color:var(--accent)">  This Device</label>
            <label class="dots-menu-item" style="display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;font-size:14px;color:var(--text-0)"><input type="radio" name="d-playback-output" value="cast" style="accent-color:var(--accent)"> Pi Cast</label>
          </div>
        </div>
      </div>
    </header>
    <section id="main-view" class="main-view main-content" aria-label="Main content">
    </section>
  </main>
  <footer id="player" class="player">
    <!-- LEFT: thumb + title -->
    <div class="player-left">
      <img id="cover-art" class="player-cover" src="assets/music_logo.png" alt="" />
      <div class="player-meta">
        <div id="now-playing-title" class="player-title">Nothing playing</div>
        <div id="now-playing-artist" class="player-artist"></div>
      </div>
    </div>
    <!-- CENTER: controls + progress -->
    <div class="player-center">
      <div class="player-controls">
        <button id="random-plays-btn" class="player-btn player-random-btn" aria-label="Shuffle"><svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.48 8.83l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-2.98-2.71z"/></svg></button>
        <button id="prev-btn" class="player-btn" aria-label="Previous"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 20L9 12l10-8v16z"/><path d="M5 19V5"/></svg></button>
        <button id="play-btn" class="player-btn play" aria-label="Play"><svg class="icon icon-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg><svg class="icon icon-pause" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M6 4h4v16H6z"/><path d="M14 4h4v16h-4z"/></svg></button>
        <button id="next-btn" class="player-btn" aria-label="Next"><svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 4l10 8-10 8V4z"/><path d="M19 5v14"/></svg></button>
        <button id="desktop-block-btn" class="player-btn" aria-label="Block Song" aria-pressed="false" title="Block Song" style="color:#e57373;"><svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5.65 3.35L5.35 17.65C4.49 16.24 4 14.68 4 12c0-4.42 3.58-8 8-8 2.68 0 4.24.49 5.65 1.35zm1.3 1.3C19.51 7.76 20 9.32 20 12c0 4.42-3.58 8-8 8-2.68 0-4.24-.49-5.65-1.35L18.95 5.65z"/></svg></button>
      </div>
      <div class="player-progress">
        <span class="time" id="current-time">0:00</span>
        <input type="range" id="progress-slider" min="0" max="100" value="0" step="0.1" style="--pct:0%" />
        <span class="time" id="total-time">0:00</span>
      </div>
    </div>
    <!-- RIGHT: volume -->
    <div class="player-right">
      <div class="player-volume">
        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M15 9a3 3 0 0 1 0 6"/><path d="M17.5 6.5a6 6 0 0 1 0 11"/></svg>
        <label for="volume-slider" class="sr-only">Volume</label>
        <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.5" aria-label="Volume" />
      </div>
    </div>
  </footer>

</div><!-- end #desktop-app -->


<!-- ═══════════════════════════════════════════════════════════
     MOBILE APP  (hidden on desktop via .mode-desktop #mobile-app)
     ═══════════════════════════════════════════════════════════ -->
<div id="mobile-app">

  <!-- TOPBAR -->
  <header id="topbar">
    <div id="topbar-default">
      <div class="topbar-left">
        <img src="assets/music_logo.png" class="topbar-icon" alt="" />
        <span class="topbar-title"><span style="font-weight:900;font-family:sans-serif;color:var(--text-0)">L5</span><span style="font-family:Didot,'Bodoni MT','Didot LT STD',serif;font-style:normal;font-weight:400;color:var(--accent)">Music</span></span>
      </div>
      <div class="topbar-center">

      </div>
      <div class="topbar-right">
        <div class="menu-dots-wrap" style="position:relative;display:inline-block">
          <button id="m-menu-dots-btn" class="icon-btn" aria-label="Menu" style="font-size:20px;letter-spacing:2px;cursor:pointer;background:none;border:none;color:var(--text-1);padding:6px 8px">⋮</button>
          <div id="m-menu-dots-dropdown" class="dots-dropdown" style="display:none;position:absolute;right:0;top:100%;min-width:180px;background:var(--bg-1);border:1px solid var(--stroke);border-radius:10px;padding:8px 0;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.3)">
            <div style="padding:8px 14px;font-size:12px;color:var(--muted);text-transform:uppercase">Playback Output</div>
            <label class="dots-menu-item" style="display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;font-size:14px;color:var(--text-0)"><input type="radio" name="m-playback-output" value="browser" checked style="accent-color:var(--accent)">  This Device</label>
            <label class="dots-menu-item" style="display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer;font-size:14px;color:var(--text-0)"><input type="radio" name="m-playback-output" value="cast" style="accent-color:var(--accent)"> Pi Cast</label>
          </div>
        </div>
        <button id="btn-search" class="icon-btn" aria-label="Search">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </button>
      </div>
    </div>
    <div id="topbar-search" class="hidden">
      <button id="btn-search-close" class="icon-btn" aria-label="Close">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
      <input id="pwa-search-input" type="search" placeholder="Search songs, artists..." autocomplete="off" />
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main id="main-content">
    <div id="loading-overlay">
      <div class="spinner"></div>
      <p>Loading library...</p>
    </div>
  </main>

  <!-- BOTTOM NAV -->
  <nav id="bottom-nav">
    <button class="bnav-item active" data-view="now-playing">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="10,8 16,12 10,16" fill="currentColor" stroke="none"/></svg>
      <span>Now Playing</span>
    </button>
    <button class="bnav-item" data-view="playlists">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="3" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="3" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>
      <span>Playlists</span>
    </button>
    <button class="bnav-item" data-view="folders">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
      <span>Folders</span>
    </button>
    <button class="bnav-item" data-view="settings">

<script>
(function(){
var cur=localStorage.getItem('l5p_output')||'browser';
document.querySelectorAll('input[name$="-playback-output"]').forEach(function(r){
if(r.value===cur)r.checked=true;
r.addEventListener('change',function(){
if(r.value==='cast'&&!localStorage.getItem('l5p_cast_url')){
alert('Pi Cast is not set up.\nGo to Settings > Pi Cast and enter your cast server URL.');
r.checked=false;
document.querySelectorAll('input[name$=\"-playback-output\"][value=\"browser\"]').forEach(function(o){o.checked=true;});
return;
}
AudioProxy.swap(r.value);
document.querySelectorAll('input[name$=\"-playback-output\"]').forEach(function(o){if(o.value===r.value)o.checked=true;});
});
});
['menu-dots-btn','m-menu-dots-btn'].forEach(function(id){
var btn=document.getElementById(id);if(!btn)return;
var dd=btn.nextElementSibling;
btn.addEventListener('click',function(e){
e.stopPropagation();
dd.style.display=dd.style.display==='none'?'block':'none';
});
});
document.addEventListener('click',function(){
document.querySelectorAll('.dots-dropdown').forEach(function(d){d.style.display='none';});
});
})();
</script>
